<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发布服务 - 学艺坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Simple WYSIWYG Editor Style (Simulated) -->
    <style>
        .editor-toolbar button { padding: 4px 8px; border-radius: 4px; }
        .editor-toolbar button:hover { background-color: #e5e7eb; }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="home.html" class="flex-shrink-0 flex items-center text-indigo-600">
                        <i class="fas fa-graduation-cap text-3xl mr-2"></i>
                        <span class="font-bold text-xl">学艺坊</span>
                    </a>
                    <span class="ml-4 text-gray-400 text-sm">| 发布服务</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 ml-2 text-gray-500">
                        <div class="relative group">
                            <button class="flex items-center focus:outline-none">
                                <img class="h-8 w-8 rounded-full object-cover border border-gray-200" src="https://picsum.photos/seed/user1/100/100" alt="User">
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <div class="bg-white rounded-xl shadow-sm p-8">
            <h1 class="text-2xl font-bold text-gray-900 mb-8">发布新服务</h1>

            <form>
                <!-- Basic Info -->
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">服务标题 <span class="text-red-500">*</span></label>
                        <input type="text" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="一句话描述你的服务，例如：Java一对一辅导" maxlength="50">
                        <p class="mt-1 text-xs text-gray-400 text-right">0/50</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">服务分类 <span class="text-red-500">*</span></label>
                        <select class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none bg-white">
                            <option value="" disabled selected>请选择分类</option>
                            <option>编程开发</option>
                            <option>平面设计</option>
                            <option>视频剪辑</option>
                            <option>语言翻译</option>
                            <option>生活服务</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">服务价格 (元) <span class="text-red-500">*</span></label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">¥</span>
                            <input type="number" class="w-full pl-8 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="0.00">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">交易方式 <span class="text-red-500">*</span></label>
                        <div class="flex gap-4 mt-2">
                            <label class="flex items-center p-3 border border-indigo-500 bg-indigo-50 rounded-lg cursor-pointer">
                                <input type="radio" name="tradeType" class="form-radio text-indigo-600" checked>
                                <div class="ml-3">
                                    <span class="block text-sm font-medium text-indigo-900">线上担保交易</span>
                                    <span class="block text-xs text-indigo-700">资金托管平台，确认后放款</span>
                                </div>
                            </label>
                            <label class="flex items-center p-3 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="tradeType" class="form-radio text-indigo-600">
                                <div class="ml-3">
                                    <span class="block text-sm font-medium text-gray-900">线下见面交易</span>
                                    <span class="block text-xs text-gray-500">面对面交付，自行结算</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">限购次数 <span class="text-xs text-gray-400 font-normal">(选填，-1表示不限制)</span></label>
                        <input type="number" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="-1">
                    </div>

                    <!-- Description (Rich Text) -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">服务描述 <span class="text-red-500">*</span></label>
                        <div class="border border-gray-300 rounded-lg overflow-hidden">
                            <div class="bg-gray-50 px-3 py-2 border-b border-gray-300 flex gap-2 editor-toolbar">
                                <button type="button" class="text-gray-600"><i class="fas fa-bold"></i></button>
                                <button type="button" class="text-gray-600"><i class="fas fa-italic"></i></button>
                                <button type="button" class="text-gray-600"><i class="fas fa-list-ul"></i></button>
                                <button type="button" class="text-gray-600"><i class="fas fa-link"></i></button>
                            </div>
                            <textarea class="w-full p-4 h-48 focus:outline-none resize-none" placeholder="详细描述你的服务内容、交付标准、注意事项等..."></textarea>
                        </div>
                        <p class="mt-1 text-xs text-gray-400 text-right">0/2000</p>
                    </div>

                    <!-- Image Upload -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">上传图片 <span class="text-red-500">*</span> <span class="text-xs text-gray-400 font-normal">(第一张将作为封面，最多10张)</span></label>
                        <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4">
                            <!-- Upload Button -->
                            <div class="aspect-square border-2 border-dashed border-gray-300 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:border-indigo-500 hover:bg-indigo-50 transition">
                                <i class="fas fa-camera text-gray-400 text-2xl mb-1"></i>
                                <span class="text-xs text-gray-500">上传图片</span>
                            </div>
                            <!-- Preview 1 -->
                            <div class="aspect-square relative rounded-lg overflow-hidden group border border-gray-200">
                                <img src="https://picsum.photos/seed/code/200/200" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black bg-opacity-40 hidden group-hover:flex items-center justify-center gap-2 transition">
                                    <button class="text-white hover:text-red-400"><i class="fas fa-trash"></i></button>
                                </div>
                                <span class="absolute bottom-0 left-0 w-full bg-indigo-600 text-white text-xs text-center py-0.5">封面</span>
                            </div>
                            <!-- Preview 2 -->
                            <div class="aspect-square relative rounded-lg overflow-hidden group border border-gray-200">
                                <img src="https://picsum.photos/seed/code2/200/200" class="w-full h-full object-cover">
                                <div class="absolute inset-0 bg-black bg-opacity-40 hidden group-hover:flex items-center justify-center gap-2 transition">
                                    <button class="text-white hover:text-red-400"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="mt-10 pt-6 border-t border-gray-100 flex items-center justify-end gap-4">
                    <button type="button" class="px-6 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition">保存草稿</button>
                    <button type="button" onclick="window.location.href='my-services.html'" class="px-8 py-2.5 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 shadow-lg hover:shadow-xl transition">
                        立即发布
                    </button>
                </div>
            </form>
        </div>

    </main>

    <footer class="bg-white border-t border-gray-200 py-8 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
            <p>&copy; 2025 学艺坊 (Xueyifang) 版权所有</p>
        </div>
    </footer>

</body>
</html>
