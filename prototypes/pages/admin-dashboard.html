<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>仪表板 - 学艺坊管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="h-16 flex items-center justify-center border-b border-gray-800">
            <span class="text-xl font-bold tracking-wider">学艺坊 Admin</span>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <a href="admin-dashboard.html" class="flex items-center px-4 py-3 bg-indigo-600 rounded-lg text-white">
                <i class="fas fa-tachometer-alt w-6 text-center mr-3"></i> 仪表板
            </a>
            <a href="admin-permission.html" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                <i class="fas fa-check-circle w-6 text-center mr-3"></i> 权限审核
                <span class="ml-auto bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">15</span>
            </a>
            <a href="admin-service-review.html" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                <i class="fas fa-tasks w-6 text-center mr-3"></i> 服务审核
                <span class="ml-auto bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">12</span>
            </a>
            <a href="admin-disputes.html" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                <i class="fas fa-gavel w-6 text-center mr-3"></i> 纠纷处理
                <span class="ml-auto bg-yellow-500 text-white text-xs px-2 py-0.5 rounded-full">5</span>
            </a>
            <a href="admin-settings.html" class="flex items-center px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-lg transition">
                <i class="fas fa-cogs w-6 text-center mr-3"></i> 系统配置
            </a>
        </nav>
        <div class="p-4 border-t border-gray-800">
            <a href="admin-login.html" class="flex items-center px-4 py-2 text-gray-400 hover:text-white transition">
                <i class="fas fa-sign-out-alt mr-3"></i> 退出登录
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
            <h2 class="text-xl font-bold text-gray-800">仪表板</h2>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-600">管理员: <strong>admin</strong></span>
                <img class="h-8 w-8 rounded-full bg-gray-300" src="https://picsum.photos/seed/admin/100/100">
            </div>
        </header>

        <!-- Scrollable Content -->
        <main class="flex-1 overflow-y-auto p-6">
            
            <!-- Stats Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-xl shadow-sm flex items-center">
                    <div class="p-3 rounded-full bg-blue-100 text-blue-600 mr-4">
                        <i class="fas fa-users text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">总用户数</p>
                        <p class="text-2xl font-bold text-gray-800">1,250</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm flex items-center">
                    <div class="p-3 rounded-full bg-green-100 text-green-600 mr-4">
                        <i class="fas fa-box text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">在线服务</p>
                        <p class="text-2xl font-bold text-gray-800">864</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm flex items-center">
                    <div class="p-3 rounded-full bg-purple-100 text-purple-600 mr-4">
                        <i class="fas fa-shopping-cart text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">今日订单</p>
                        <p class="text-2xl font-bold text-gray-800">32</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm flex items-center">
                    <div class="p-3 rounded-full bg-yellow-100 text-yellow-600 mr-4">
                        <i class="fas fa-coins text-2xl"></i>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm">今日交易额</p>
                        <p class="text-2xl font-bold text-gray-800">¥ 4,520</p>
                    </div>
                </div>
            </div>

            <!-- Todo & Chart -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                <!-- Todo List -->
                <div class="bg-white rounded-xl shadow-sm p-6 lg:col-span-1">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">待办事项</h3>
                    <div class="space-y-4">
                        <a href="admin-permission.html" class="flex items-center justify-between p-3 bg-red-50 rounded-lg hover:bg-red-100 transition border border-red-100">
                            <div class="flex items-center">
                                <i class="fas fa-user-check text-red-500 mr-3"></i>
                                <span class="text-gray-700">权限申请审核</span>
                            </div>
                            <span class="bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full">15</span>
                        </a>
                        <a href="admin-service-review.html" class="flex items-center justify-between p-3 bg-yellow-50 rounded-lg hover:bg-yellow-100 transition border border-yellow-100">
                            <div class="flex items-center">
                                <i class="fas fa-clipboard-check text-yellow-600 mr-3"></i>
                                <span class="text-gray-700">新服务审核</span>
                            </div>
                            <span class="bg-yellow-600 text-white text-xs font-bold px-2 py-1 rounded-full">12</span>
                        </a>
                        <a href="admin-disputes.html" class="flex items-center justify-between p-3 bg-orange-50 rounded-lg hover:bg-orange-100 transition border border-orange-100">
                            <div class="flex items-center">
                                <i class="fas fa-exclamation-triangle text-orange-500 mr-3"></i>
                                <span class="text-gray-700">交易纠纷处理</span>
                            </div>
                            <span class="bg-orange-500 text-white text-xs font-bold px-2 py-1 rounded-full">5</span>
                        </a>
                    </div>
                </div>

                <!-- Chart -->
                <div class="bg-white rounded-xl shadow-sm p-6 lg:col-span-2">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">最近7日交易趋势</h3>
                    <div class="h-64">
                        <canvas id="orderChart"></canvas>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- Chart.js Init -->
    <script>
        const ctx = document.getElementById('orderChart').getContext('2d');
        const orderChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['周一', '周二', '周三', '周四', '周五', '周六', '周日'],
                datasets: [{
                    label: '订单数',
                    data: [12, 19, 3, 5, 2, 3, 20],
                    borderColor: '#4f46e5',
                    tension: 0.4,
                    fill: false
                }, {
                    label: '交易额 (百元)',
                    data: [15, 22, 5, 8, 4, 6, 25],
                    borderColor: '#10b981',
                    tension: 0.4,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>

</body>
</html>
