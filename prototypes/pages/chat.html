<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>消息中心 - 学艺坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none;  scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm flex-none z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="home.html" class="flex-shrink-0 flex items-center text-indigo-600">
                        <i class="fas fa-graduation-cap text-3xl mr-2"></i>
                        <span class="font-bold text-xl">学艺坊</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative group">
                        <button class="flex items-center focus:outline-none">
                            <img class="h-8 w-8 rounded-full object-cover border border-gray-200" src="https://picsum.photos/seed/user1/100/100" alt="User">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Chat Interface -->
    <div class="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-6 lg:p-8 overflow-hidden">
        <div class="bg-white rounded-2xl shadow-lg w-full h-full flex overflow-hidden">
            
            <!-- Left: Sidebar (Chat List) -->
            <div class="w-80 bg-white border-r border-gray-200 flex flex-col">
                <!-- Header -->
                <div class="p-4 border-b border-gray-200 flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-800">消息</h2>
                    <button class="text-gray-400 hover:text-indigo-600"><i class="fas fa-edit"></i></button>
                </div>
                <!-- Search -->
                <div class="p-4 pb-2">
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><i class="fas fa-search"></i></span>
                        <input type="text" class="w-full pl-10 pr-4 py-2 bg-gray-100 border-transparent rounded-lg text-sm focus:bg-white focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition" placeholder="搜索聊天...">
                    </div>
                </div>
                <!-- List -->
                <div class="flex-1 overflow-y-auto no-scrollbar p-2 space-y-1">
                    
                    <!-- Chat Item: Active -->
                    <div class="flex items-center p-3 rounded-lg bg-indigo-50 cursor-pointer group">
                        <div class="relative">
                            <img class="h-12 w-12 rounded-full object-cover" src="https://picsum.photos/seed/user2/100/100">
                            <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-green-400 ring-2 ring-white"></span>
                        </div>
                        <div class="ml-3 flex-1 overflow-hidden">
                            <div class="flex justify-between items-baseline">
                                <span class="font-semibold text-gray-900 truncate">张学长</span>
                                <span class="text-xs text-gray-500">12:45</span>
                            </div>
                            <p class="text-sm text-gray-600 truncate">好的，晚上8点开始辅导。</p>
                        </div>
                    </div>

                    <!-- Chat Item: Unread -->
                    <div class="flex items-center p-3 rounded-lg hover:bg-gray-50 cursor-pointer group">
                        <div class="relative">
                            <img class="h-12 w-12 rounded-full object-cover" src="https://picsum.photos/seed/user3/100/100">
                            <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-gray-300 ring-2 ring-white"></span>
                        </div>
                        <div class="ml-3 flex-1 overflow-hidden">
                            <div class="flex justify-between items-baseline">
                                <span class="font-semibold text-gray-900 truncate">李设计</span>
                                <span class="text-xs text-indigo-600 font-bold">09:30</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <p class="text-sm text-gray-900 font-medium truncate">初稿已经发给你了，看一下。</p>
                                <span class="bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">2</span>
                            </div>
                        </div>
                    </div>

                    <!-- Chat Item -->
                    <div class="flex items-center p-3 rounded-lg hover:bg-gray-50 cursor-pointer group">
                        <div class="relative">
                            <img class="h-12 w-12 rounded-full object-cover" src="https://picsum.photos/seed/user4/100/100">
                        </div>
                        <div class="ml-3 flex-1 overflow-hidden">
                            <div class="flex justify-between items-baseline">
                                <span class="font-semibold text-gray-900 truncate">王剪辑</span>
                                <span class="text-xs text-gray-500">昨天</span>
                            </div>
                            <p class="text-sm text-gray-500 truncate">没问题，合作愉快！</p>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Right: Chat Window -->
            <div class="flex-1 flex flex-col bg-gray-50">
                
                <!-- Header -->
                <div class="h-16 px-6 bg-white border-b border-gray-200 flex justify-between items-center shadow-sm z-10">
                    <div class="flex items-center">
                        <h3 class="font-bold text-lg text-gray-800 mr-2">张学长</h3>
                        <span class="px-2 py-0.5 rounded-full bg-green-100 text-green-800 text-xs font-medium">在线</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <button class="text-gray-500 hover:text-indigo-600" title="查看服务"><i class="fas fa-file-alt text-lg"></i></button>
                        <button class="text-gray-500 hover:text-indigo-600" title="更多"><i class="fas fa-ellipsis-v text-lg"></i></button>
                    </div>
                </div>

                <!-- Messages Area -->
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    
                    <!-- Date Separator -->
                    <div class="flex justify-center">
                        <span class="text-xs text-gray-400 bg-gray-200 px-3 py-1 rounded-full">2025年10月27日 10:30</span>
                    </div>

                    <!-- Message: Other -->
                    <div class="flex items-end">
                        <img class="h-8 w-8 rounded-full object-cover mr-3 mb-1" src="https://picsum.photos/seed/user2/100/100">
                        <div class="bg-white p-3 rounded-2xl rounded-bl-none shadow-sm max-w-md text-sm text-gray-800">
                            你好，请问你对Java辅导有什么具体需求吗？是基础学习还是项目实战？
                        </div>
                    </div>

                    <!-- Message: Me -->
                    <div class="flex items-end justify-end">
                        <div class="bg-indigo-600 p-3 rounded-2xl rounded-br-none shadow-sm max-w-md text-sm text-white">
                            我想学习Spring Boot框架，主要为了做毕业设计。
                        </div>
                        <img class="h-8 w-8 rounded-full object-cover ml-3 mb-1" src="https://picsum.photos/seed/user1/100/100">
                    </div>

                    <!-- Message: System (Order) -->
                    <div class="flex justify-center my-4">
                        <div class="bg-white border border-gray-200 p-3 rounded-lg shadow-sm max-w-sm w-full">
                            <div class="flex gap-3">
                                <img src="https://picsum.photos/seed/code/100/100" class="w-12 h-12 rounded object-cover">
                                <div class="flex-1 overflow-hidden">
                                    <h4 class="text-sm font-bold text-gray-900 truncate">Java/Python 毕设辅导与代码调试</h4>
                                    <p class="text-xs text-red-600 font-bold mt-1">¥ 99.99</p>
                                </div>
                            </div>
                            <div class="mt-3 pt-2 border-t border-gray-100 text-center">
                                <span class="text-xs text-gray-500">您已创建订单，等待支付</span>
                            </div>
                        </div>
                    </div>

                    <!-- Message: Other -->
                    <div class="flex items-end">
                        <img class="h-8 w-8 rounded-full object-cover mr-3 mb-1" src="https://picsum.photos/seed/user2/100/100">
                        <div class="bg-white p-3 rounded-2xl rounded-bl-none shadow-sm max-w-md text-sm text-gray-800">
                            好的，没问题。我已经辅导过很多毕设项目了。
                        </div>
                    </div>

                    <!-- Message: Other -->
                    <div class="flex items-end">
                        <img class="h-8 w-8 rounded-full object-cover mr-3 mb-1" src="https://picsum.photos/seed/user2/100/100">
                        <div class="bg-white p-3 rounded-2xl rounded-bl-none shadow-sm max-w-md text-sm text-gray-800">
                            那你先支付订单，我们晚上8点开始第一次辅导，大概1小时。
                        </div>
                    </div>

                    <!-- Message: Me -->
                    <div class="flex items-end justify-end">
                        <div class="bg-indigo-600 p-3 rounded-2xl rounded-br-none shadow-sm max-w-md text-sm text-white">
                            好的，晚上8点见。
                        </div>
                        <img class="h-8 w-8 rounded-full object-cover ml-3 mb-1" src="https://picsum.photos/seed/user1/100/100">
                    </div>

                </div>

                <!-- Input Area -->
                <div class="bg-white p-4 border-t border-gray-200">
                    <div class="flex gap-2 mb-3 text-gray-500">
                        <button class="hover:text-indigo-600 p-1"><i class="far fa-smile text-xl"></i></button>
                        <button class="hover:text-indigo-600 p-1"><i class="far fa-image text-xl"></i></button>
                        <button class="hover:text-indigo-600 p-1"><i class="fas fa-paperclip text-xl"></i></button>
                    </div>
                    <div class="flex gap-4">
                        <textarea class="flex-1 bg-gray-100 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none h-20" placeholder="输入消息... (Enter 发送)"></textarea>
                        <button class="self-end bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-indigo-700 transition shadow-md">发送</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
